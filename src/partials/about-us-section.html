<section class="about-us-section" id="about">
  <div class="container about-us-container">
    <h2 class="section-tittle">Чому Хатинка Лапок</h2>

    <div class="about-us-slider-container">
      <div class="swiper about-us-gallery">
        <div class="swiper-wrapper"></div>

        <div class="slider-controls">
          <div class="swiper-pagination"></div>
          <div class="slider-buttons">
            <button type="button" class="swiper-button-prev">
              <img
                class="icon-swiper"
                src="/svg/arrow_back.svg"
                width="16"
                height="16"
                alt="prev"
              />
            </button>
            <button type="button" class="swiper-button-next">
              <img
                class="icon-swiper"
                src="/svg/arrow_forward.svg"
                width="16"
                height="16"
                alt="prev"
              />
            </button>
          </div>
        </div>
      </div>
      <!-- swiper about-us-gallery -->
    </div>
    <!-- about-us-slider-container -->
  </div>
  <!-- container about-us-container -->
</section>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <section class="stories-section" id="stories-section">
      <div class="container">
        <div class="stories-title-wrapper">
          <h2 class="stories-title">Щасливі історії, що надихають</h2>
          <p class="stories-subtitle">
            Ці хвостики вже знайшли свій дім. Ваш майбутній друг теж чекає на
            вас
          </p>
        </div>
        <div class="swiper feedbacks-slider">
          <div class="swiper-wrapper" id="stories-list"></div>
        </div>
        <div class="swiper-controls">
          <div class="swiper-pag"></div>
          <div class="swiper-buttons">
            <div class="swiper-prev-button">
              <svg class="swiper-prev-button-svg">
                <use href="../svg/arrow_back.svg"></use>
              </svg>
            </div>
            <div class="swiper-next-button">
              <svg class="swiper-next-button-svg">
                <use href="../svg/arrow_forward.svg"></use>
              </svg>
            </div>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>

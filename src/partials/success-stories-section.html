<section class="stories-section" id="stories-section">
  <div class="container">
    <div class="stories-title-wrapper">
      <h2 class="stories-title">Щасливі історії, що надихають</h2>
      <p class="stories-subtitle">
        Ці хвостики вже знайшли свій дім. Ваш майбутній друг теж чекає на вас
      </p>
    </div>

    <div class="stories-loader" id="stories-loader" aria-hidden="true">
      <div class="stories-spinner"></div>
    </div>

    <div class="swiper feedbacks-slider">
      <div class="swiper-wrapper" id="stories-list"></div>
    </div>

    <div class="swiper-controls">
      <div class="swiper-pag"></div>
      <div class="swiper-buttons">
        <button class="swiper-prev-button" type="button">
          <img
            class="swiper-prev-button-svg"
            src="/svg/arrow_back.svg"
            width="24"
            height="24"
            alt="prev"
          />
        </button>
        <button class="swiper-next-button" type="button">
          <img
            class="swiper-next-button-svg"
            src="/svg/arrow_forward.svg"
            width="24"
            height="24"
            alt="next"
          />
        </button>
      </div>
    </div>
  </div>
</section>
